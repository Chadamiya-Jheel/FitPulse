{% extends "base.html" %}
{% block title %}{{ code }} Error — FitPulse{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-80">
  <div class="text-center">
    <div class="error-code">{{ code }}</div>
    <h3 class="fw-700 mb-2">{{ message }}</h3>
    <p class="text-muted mb-4">Don't worry, let's get you back on track.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary px-4">
      <i class="fas fa-home me-2"></i>Back to Home
    </a>
  </div>
</div>
{% endblock %}
