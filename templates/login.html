{% extends "base.html" %}
{% block title %}Login — FitPulse{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-heartbeat"></i></div>
      <h2 class="fw-800">Welcome Back!</h2>
      <p class="text-muted">Log in to continue your fitness journey</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label fw-600">Username or Email</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="identifier" class="form-control ps-5" placeholder="Username or email" required autocomplete="username"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="password" class="form-control ps-5" placeholder="Your password" required autocomplete="current-password"/>
          <button type="button" class="btn-toggle-pass" onclick="togglePass('password','eye1')"><i id="eye1" class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" name="remember" id="remember"/>
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg fw-600">
        <i class="fas fa-sign-in-alt me-2"></i>Login
      </button>
    </form>
    <p class="text-center mt-3 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="fw-600">Register</a></p>
  </div>
</div>
{% endblock %}
