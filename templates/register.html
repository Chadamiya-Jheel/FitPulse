{% extends "base.html" %}
{% block title %}Register — FitPulse{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-heartbeat"></i></div>
      <h2 class="fw-800">Create Account</h2>
      <p class="text-muted">Join FitPulse and start your fitness journey</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="mb-3">
        <label class="form-label fw-600">Username</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="username" class="form-control ps-5" placeholder="Choose a username" required autocomplete="username"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Email</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" name="email" class="form-control ps-5" placeholder="your@email.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-600">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" id="password" class="form-control ps-5" placeholder="Create a strong password" required autocomplete="new-password"/>
          <button type="button" class="btn-toggle-pass" onclick="togglePass('password','eye1')"><i id="eye1" class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-600">Confirm Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="confirm_password" id="confirm_password" class="form-control ps-5" placeholder="Repeat your password" required autocomplete="new-password"/>
          <button type="button" class="btn-toggle-pass" onclick="togglePass('confirm_password','eye2')"><i id="eye2" class="fas fa-eye-slash"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg fw-600">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>
    <p class="text-center mt-3 text-muted">Already have an account? <a href="{{ url_for('login') }}" class="fw-600">Login</a></p>
  </div>
</div>
{% endblock %}
